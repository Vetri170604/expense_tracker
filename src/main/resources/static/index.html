</head>

<body>

<header>

<h2>Expense Tracker</h2>

<div>
<button onclick="toggleDark()">Dark Mode</button>
<button onclick="logout()">Logout</button>
</div>

</header>

<div class="container">

<h3 id="welcome"></h3>

<div class="cards">

<div class="card">
<h4>Balance</h4>
<h2 id="balance">0</h2>
</div>

<div class="card">
<h4>Total Expense</h4>
<h2 id="expenseTotal">0</h2>
</div>

<div class="card">
<h4>Savings</h4>
<h2 id="saving">0</h2>
</div>

<div class="card">
<h4>Debt</h4>
<h2 id="debt">0</h2>
</div>

</div>

<div class="controls">

<input id="expenseName" placeholder="Expense Name">

<input id="amount" type="number" placeholder="Amount">

<select id="category">
<option>Food</option>
<option>Medical</option>
<option>Education</option>
<option>Transport</option>
<option>Shopping</option>
<option>Bills</option>
<option>Entertainment</option>
<option>Others</option>
</select>

<select id="payment">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
</select>

<button onclick="addExpense()">Add Expense</button>

<p id="limitMessage"></p>
<p id="aiSuggestion"></p>

</div>

<div class="charts">

<canvas id="pieChart"></canvas>
<canvas id="monthlyChart"></canvas>

</div>

<h3>AI Analysis</h3>

<p>Prediction: <span id="prediction"></span></p>
<p>Financial Health Score: <span id="healthScore"></span></p>

<!-- ✅ NEW: MONTH FILTER -->
<div style="text-align:center; margin-top:20px;">
<label>Select Month:</label>
<input type="month" id="monthFilter">
</div>

<!-- ✅ REPORT BUTTONS -->
<div style="text-align:center; margin-top:10px;">
<button onclick="generateReport()">Generate Report</button>
<button onclick="downloadExcel()">Excel</button>
<button onclick="downloadPDF()">PDF</button>
</div>

<!-- ✅ REPORT OUTPUT -->
<div id="reportOutput" style="margin-top:20px;"></div>

<h3>Expense List</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Category</th>
<th>Payment</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="expenseList"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
